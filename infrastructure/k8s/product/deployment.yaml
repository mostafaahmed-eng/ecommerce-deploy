apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: ghcr.io/mostafaahmed-eng/ecommerce-deploy/product:latest
        ports:
        - containerPort: 4500

---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: ecommerce
spec:
  type: ClusterIP
  ports:
  - port: 4500
    targetPort: 4500
  selector:
    app: product
