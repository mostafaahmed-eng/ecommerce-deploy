apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart
        image: ghcr.io/mostafaahmed-eng/ecommerce-deploy/cart:latest
        ports:
        - containerPort: 4300

---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: ecommerce
spec:
  type: ClusterIP
  ports:
  - port: 4300
    targetPort: 4300
  selector:
    app: cart
