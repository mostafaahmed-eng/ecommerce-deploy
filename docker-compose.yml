version: '3.8'

services:
  frontend:
    build: ./services/frontend
    container_name: ecommerce-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:4000
      - SEARCH_URL=http://search:5000
    depends_on:
      - backend
      - search
    networks:
      - ecommerce-network
    restart: unless-stopped

  backend:
    build: ./services/backend
    container_name: ecommerce-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - PAYMENT_URL=http://payment:4200
    depends_on:
      - payment
    networks:
      - ecommerce-network
    restart: unless-stopped

  payment:
    build: ./services/payment
    container_name: ecommerce-payment
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
      - PORT=4200
    networks:
      - ecommerce-network
    restart: unless-stopped

  search:
    build: ./services/search
    container_name: ecommerce-search
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    networks:
      - ecommerce-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ecommerce-network
    restart: unless-stopped

networks:
  ecommerce-network:
    driver: bridge